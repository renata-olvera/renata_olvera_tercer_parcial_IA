<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ruta gráfica con Dijkstra</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      padding: 18px;
    }

    h1 {
      color: #1e3a8a;
      text-align: center;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 18px;
    }

    .panel {
      background: white;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    svg {
      width: 100%;
      height: 520px;
      background: #eef2ff;
      border-radius: 12px;
      border: 1px solid #c7d2fe;
    }

    .ruta {
      color: #f97316;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <h1>Ruta Gráfica de Dijkstra</h1>

  <div class="layout">
    <section class="panel">
      <h2>Resultado</h2>
      <p><strong>Inicio:</strong> A</p>
      <p><strong>Destino:</strong> F</p>
      <p><strong>Distancia mínima:</strong> 9</p>
      <p><strong>Camino:</strong></p>
      <p class="ruta">A → B → C → E → D → F</p>

      <p>
        La ruta más corta aparece en color naranja.
        El nodo inicial aparece en amarillo y el destino en azul.
      </p>
    </section>

    <section class="panel">
      <svg viewBox="0 0 750 520">
        <defs>
          <marker id="flecha" markerWidth="10" markerHeight="10"
                  refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#475569" />
          </marker>
        </defs>

        
        <line x1="120" y1="90" x2="300" y2="90"
              stroke="#f97316" stroke-width="5" marker-end="url(#flecha)" />

        <text x="210.0" y="80.0" text-anchor="middle"
              font-size="14" font-weight="bold">2</text>
        
        <line x1="120" y1="90" x2="120" y2="260"
              stroke="#475569" stroke-width="2" marker-end="url(#flecha)" />

        <text x="120.0" y="165.0" text-anchor="middle"
              font-size="14" font-weight="bold">4</text>
        
        <line x1="300" y1="90" x2="120" y2="260"
              stroke="#f97316" stroke-width="5" marker-end="url(#flecha)" />

        <text x="210.0" y="165.0" text-anchor="middle"
              font-size="14" font-weight="bold">1</text>
        
        <line x1="300" y1="90" x2="480" y2="260"
              stroke="#475569" stroke-width="2" marker-end="url(#flecha)" />

        <text x="390.0" y="165.0" text-anchor="middle"
              font-size="14" font-weight="bold">7</text>
        
        <line x1="120" y1="260" x2="300" y2="420"
              stroke="#f97316" stroke-width="5" marker-end="url(#flecha)" />

        <text x="210.0" y="330.0" text-anchor="middle"
              font-size="14" font-weight="bold">3</text>
        
        <line x1="480" y1="260" x2="600" y2="420"
              stroke="#f97316" stroke-width="5" marker-end="url(#flecha)" />

        <text x="540.0" y="330.0" text-anchor="middle"
              font-size="14" font-weight="bold">1</text>
        
        <line x1="300" y1="420" x2="480" y2="260"
              stroke="#f97316" stroke-width="5" marker-end="url(#flecha)" />

        <text x="390.0" y="330.0" text-anchor="middle"
              font-size="14" font-weight="bold">2</text>
        
        <line x1="300" y1="420" x2="600" y2="420"
              stroke="#475569" stroke-width="2" marker-end="url(#flecha)" />

        <text x="450.0" y="410.0" text-anchor="middle"
              font-size="14" font-weight="bold">5</text>
        
        
        <circle cx="120" cy="90" r="26" fill="#fde68a"
                stroke="#0f172a" stroke-width="2" />

        <text x="120" y="96" text-anchor="middle"
              font-size="16" font-weight="bold">A</text>
        
        <circle cx="300" cy="90" r="26" fill="#fed7aa"
                stroke="#0f172a" stroke-width="2" />

        <text x="300" y="96" text-anchor="middle"
              font-size="16" font-weight="bold">B</text>
        
        <circle cx="120" cy="260" r="26" fill="#fed7aa"
                stroke="#0f172a" stroke-width="2" />

        <text x="120" y="266" text-anchor="middle"
              font-size="16" font-weight="bold">C</text>
        
        <circle cx="480" cy="260" r="26" fill="#fed7aa"
                stroke="#0f172a" stroke-width="2" />

        <text x="480" y="266" text-anchor="middle"
              font-size="16" font-weight="bold">D</text>
        
        <circle cx="300" cy="420" r="26" fill="#fed7aa"
                stroke="#0f172a" stroke-width="2" />

        <text x="300" y="426" text-anchor="middle"
              font-size="16" font-weight="bold">E</text>
        
        <circle cx="600" cy="420" r="26" fill="#a5f3fc"
                stroke="#0f172a" stroke-width="2" />

        <text x="600" y="426" text-anchor="middle"
              font-size="16" font-weight="bold">F</text>
        
      </svg>
    </section>
  </div>
</body>
</html>
